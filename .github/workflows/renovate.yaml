---
name: Renovate

on:
  schedule:
    - cron: "00 2 * * *"

jobs:
  renovate:
    name: Renovate
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2
      - name: Self-hosted Renovate
        uses: renovatebot/github-action@v46.1.5
        with:
          token: ${{ secrets.RENOVATE_TOKEN }}
